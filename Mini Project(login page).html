<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Music</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: url("cosmic-nebula-space-background.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        
        header {
            display: flex;
            justify-content: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.6);
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #ff0000;
        }

        
        .hero {
            text-align: center;
            padding: 60px 20px;
        }
        .hero img {
            width: 220px;
            height: auto;
            margin-bottom: 10px; 
        }
        .hero h1 {
            font-size: 40px;
            margin: 10px 0; 
            color: #ffffff;
        }
        .hero p {
            font-size: 18px;
            margin: 10px 0 20px 0;
        }
        .hero button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            background-color: #ff0000;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .hero button:hover {
            background-color: #cc0000;
        }

       
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Explore</a>
            <a href="#">Playlists</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

   
    <section class="hero">
        <img src="cloud logo.png" alt="Cloud Music Logo">
        <h1>Welcome to Cloud Music!</h1>
        <p>Stream Beyond Limits — Your Sound, Your Sky</p>
        <button onclick="window.location.href='index1.html'">Go to Cloud Music</button>
    </section>
</body>
</html>
