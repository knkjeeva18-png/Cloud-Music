<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url("cosmic-nebula-space-background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        
        
        .main-container {
            width: 95%;
            max-width: 1100px;
            margin: 40px 0;
            padding: 30px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        h2 {
            font-weight: normal;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .album-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }
        
        .album-card {
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        
        .album-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        
        iframe {
            border-radius: 15px;
        }
        
        @media (max-width: 768px) {
            iframe {
                height: 300px;
            }
        }
    </style>
</head>
